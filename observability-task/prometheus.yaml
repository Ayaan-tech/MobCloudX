global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    monitor: mobcloudx-monitor

rule_files:
  - /etc/prometheus/recording.rules.yml
  - /etc/prometheus/alerts.rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: producer
    metrics_path: /metrics
    static_configs:
      - targets:
          - producer:3001

  - job_name: consumer
    metrics_path: /metrics
    static_configs:
      - targets:
          - consumer:3002

  - job_name: cadvisor
    metrics_path: /metrics
    static_configs:
      - targets:
          - cadvisor:8080
 