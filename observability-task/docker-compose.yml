services:
  prometheus:
    image: prom/prometheus:latest
    container_name: transcoder-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./recording.rules.yml:/etc/prometheus/recording.rules.yml:ro
      - ./alerts.rules.yml:/etc/prometheus/alerts.rules.yml:ro
      - prometheus-storage:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=7d
    networks:
      - mcx-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: transcoder-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - mcx-network

  alloy:
    image: grafana/alloy:latest
    container_name: transcoder-alloy
    volumes:
      - ./alloy.river:/etc/agent/config.river:ro
    command: run /etc/agent/config.river
    depends_on:
      - prometheus
    networks:
      - mcx-network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: transcoded-grafana
    restart: unless-stopped
    ports:
      - "4000:3000"
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
      - grafana-storage:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - mcx-network

volumes:
  grafana-storage:
  prometheus-storage:

networks:
  mcx-network:
    external: true
    name: mcx-network
      