groups:
  - name: mobcloudx-latency
    rules:
      - record: mobcloudx:http_request_latency_seconds:p95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, job, route, method) (
              rate(http_server_request_duration_seconds_bucket[5m])
            )
          )
      - record: mobcloudx:http_request_latency_seconds:p55
        expr: |
          histogram_quantile(
            0.55,
            sum by (le, job, route, method) (
              rate(http_server_request_duration_seconds_bucket[5m])
            )
          )
