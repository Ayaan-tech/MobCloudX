# ─────────────────────────────────────────────────────────────
# MobCloudX — Full Pipeline Orchestration
# ─────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d            → start all services
#   docker compose up -d --build    → rebuild & start
#   docker compose logs -f producer → tail producer logs
#   docker compose down -v          → tear down (wipe volumes)
# ─────────────────────────────────────────────────────────────

services:
  # ── Infrastructure ────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mcx-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - mcx-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mcx-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - mcx-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mcx-redis
    ports:
      - "6379:6379"
    networks:
      - mcx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.1.1
    container_name: mcx-loki
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./grafana/loki-config.yml:/etc/loki/local-config.yaml:ro
    networks:
      - mcx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  promtail:
    image: grafana/promtail:3.1.1
    container_name: mcx-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./grafana/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - mcx-network
    restart: unless-stopped

  # ── Application Services ──────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: mcx-producer
    ports:
      - "3001:3001"
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mcx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: mcx-consumer
    ports:
      - "3002:3002"
    environment:
      KAFKA_BROKERS: kafka:9092
      MONGO_URI: "mongodb+srv://amjadquasmi_db_user:lOkiYzI0dzIS1tgw@cluster0.6yieivd.mongodb.net/?retryWrites=true&w=majority&appName=Cluster0"
      MONGO_DB_NAME: test
    depends_on:
      kafka:
        condition: service_healthy
      producer:
        condition: service_healthy
    networks:
      - mcx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PK}
        CLERK_SECRET_KEY: ${CLERK_SK}
        MONGODB_URI: "mongodb+srv://amjadquasmi_db_user:lOkiYzI0dzIS1tgw@cluster0.6yieivd.mongodb.net/?retryWrites=true&w=majority&appName=Cluster0"
        DB_NAME: test
    container_name: mcx-client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PK}
      CLERK_SECRET_KEY: ${CLERK_SK}
      MONGODB_URI: "mongodb+srv://amjadquasmi_db_user:lOkiYzI0dzIS1tgw@cluster0.6yieivd.mongodb.net/?retryWrites=true&w=majority&appName=Cluster0"
      DB_NAME: test
      NEXT_PUBLIC_API_URL: http://localhost:3000
    networks:
      - mcx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile
    container_name: mcx-inference
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: "mongodb+srv://amjadquasmi_db_user:lOkiYzI0dzIS1tgw@cluster0.6yieivd.mongodb.net/?retryWrites=true&w=majority&appName=Cluster0"
      MONGO_DB: test
      INFERENCE_PORT: 8000
      PRODUCER_API_URL: http://mcx-producer:3001
      KAFKA_BROKERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      STREAM_API_KEY: ${STREAM_API_KEY}
      STREAM_API_SECRET: ${STREAM_API_SECRET}
      WEBRTC_TELEMETRY_TOPIC: ${WEBRTC_TELEMETRY_TOPIC:-webrtc-telemetry}
      WEBRTC_QOE_TOPIC: ${WEBRTC_QOE_TOPIC:-webrtc-qoe-scores}
      WEBRTC_ADAPTATION_TOPIC: ${WEBRTC_ADAPTATION_TOPIC:-webrtc-adaptations}
      WEBRTC_TELEMETRY_DLQ_TOPIC: ${WEBRTC_TELEMETRY_DLQ_TOPIC:-webrtc-telemetry-dlq}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      POLYGON_GOERLI_RPC: ${POLYGON_GOERLI_RPC}
      ZK_WALLET_PRIVATE_KEY: ${ZK_WALLET_PRIVATE_KEY}
      ZK_WALLET_ADDRESS: ${ZK_WALLET_ADDRESS}
      ZK_SLA_THRESHOLD: ${ZK_SLA_THRESHOLD:-60.0}
      ZK_MAX_STALLS: ${ZK_MAX_STALLS:-0}
    depends_on:
      producer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mcx-network
    restart: unless-stopped
    # Inference exposes /health — used by transcoder and any future dependents
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Transcoding Container ─────────────────────────────────
  transcoder:
    build:
      context: ./videoTranscoding/container
      dockerfile: Dockerfile
    container_name: mcx-transcoder
    environment:
      S3_BUCKET: ${S3_BUCKET:-video-transcoding-mob.mobcloudx.xyz}
      S3_KEY: ${S3_KEY:-videos/input.mp4}
      RESOLUTIONS: ${RESOLUTIONS:-240p,360p,480p,720p,1080p}
      PRODUCER_URL: http://mcx-producer:3001
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_PRODUCTION_BUCKET: ${S3_PRODUCTION_BUCKET:-prod-video.mobcloudx.xyz}
    volumes:
      - ./realesgran/results:/app/enhanced
    depends_on:
      producer:
        condition: service_healthy
    networks:
      - mcx-network

  # ── Observability ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mcx-prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=180d
      - --web.enable-lifecycle
    volumes:
      - ./observability-task/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./observability-task/recording.rules.yml:/etc/prometheus/recording.rules.yml:ro
      - ./observability-task/alerts.rules.yml:/etc/prometheus/alerts.rules.yml:ro
      - prometheus-storage:/prometheus
    networks:
      - mcx-network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: mcx-cadvisor
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - mcx-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: mcx-grafana
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/qoe-dashboard.json:/var/lib/grafana/dashboards/qoe-dashboard.json
      - ./grafana/webrtc_dashboard.json:/var/lib/grafana/dashboards/webrtc_dashboard.json
      - ./grafana/dashboards/default.yml:/etc/grafana/provisioning/dashboards/default.yml
      - ./grafana/datasources/mongodb.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - prometheus
      - cadvisor
      - loki
    networks:
      - mcx-network
    restart: unless-stopped

volumes:
  grafana-storage:
  prometheus-storage:

networks:
  mcx-network:
    driver: bridge
